name: CI Pipeline

on:
  push:
    branches: [ main, practice-actions ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. ビルド（リポジトリの取得とPythonセットアップ）
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2. チェック（ライブラリのインストールと構文チェック）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8  # 構文チェック用のツール

      - name: Lint with flake8
        run: |
          # 致命的な構文エラーがないかチェック
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # 3. テスト（スクリプトの実行）
      - name: Run automated tests
        env:
          # ここで前回の「Secrets」を環境変数として注入！
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Running RAG application tests..."
          # 本来は pytest などを使いますが、練習用に簡単なコマンドを実行
          python -c "import os; print('API Key is set:' if os.getenv('GEMINI_API_KEY') else 'API Key is MISSING')"