name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, practice-actions ]

jobs:
  # ジョブ1：テスト（先ほどのマトリックス）
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install flake8 langchain-huggingface langchain-chroma google-genai
      - name: Run Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # ジョブ2：Dockerビルド（テストが成功した時だけ実行）
  build-docker:
    needs: test  # testジョブが成功した時だけ動く
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # mainに合流した時だけビルド
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 自動で発行されるトークン

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/rag-app:latest